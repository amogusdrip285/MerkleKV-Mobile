name: Tests
on: [push, pull_request]

jobs:
  unit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/merkle_kv_core
    steps:
      - uses: actions/checkout@v4
      
      # Install jq first to fix the Flutter action dependency
      - name: Install jq and other dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq curl unzip
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.3"
          channel: 'stable'
          cache: true
          
      - name: Install dependencies
        run: flutter pub get
        
      - name: Run static analysis
        run: dart analyze --fatal-infos
        
      - name: Run unit tests
        run: dart test --reporter=expanded

  integration:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/merkle_kv_core
    env:
      MQTT_HOST: 127.0.0.1
      MQTT_PORT: 1883
      IT_REQUIRE_BROKER: '1'
    steps:
      - uses: actions/checkout@v4
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y mosquitto mosquitto-clients netcat-openbsd jq curl unzip
          
      - name: Configure and start Mosquitto
        run: |
          sudo tee /etc/mosquitto/conf.d/testing.conf << EOF
          listener 1883 0.0.0.0
          allow_anonymous true
          persistence false
          EOF
          
          sudo systemctl start mosquitto
          sudo systemctl enable mosquitto
          
          for i in {1..30}; do
            if nc -z 127.0.0.1 1883 2>/dev/null; then
              echo "✅ Mosquitto is ready"
              break
            fi
            echo "Waiting for Mosquitto... ($i/30)"
            sleep 2
          done
          
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.3"
          channel: 'stable'
          cache: true
          
      - name: Install dependencies
        run: flutter pub get
        
      - name: Run integration tests
        run: |
          echo "🚀 Running integration tests..."
          dart test test/commands/integration_test.dart --reporter=expanded